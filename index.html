<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>理事会タスク管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">🏢 理事会タスク管理</div>
    <div class="auth-sub">スタジオ新大阪管理組合</div>
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">ログイン</div>
      <div class="auth-tab" data-tab="signup">新規登録</div>
    </div>
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">メールアドレス</label>
        <input class="form-input" type="email" id="login-email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <input class="form-input" type="password" id="login-password" placeholder="password">
      </div>
      <button class="btn-primary" id="btn-login">ログイン</button>
      <div style="text-align:center;margin-top:12px">
        <span style="font-size:12px;color:var(--text2);cursor:pointer;text-decoration:underline" id="btn-forgot">パスワードを忘れた方はこちら</span>
      </div>
    </div>
    <div id="signup-form" style="display:none">
      <div class="form-group">
        <label class="form-label">メールアドレス</label>
        <input class="form-input" type="email" id="signup-email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">パスワード（6文字以上）</label>
        <input class="form-input" type="password" id="signup-password" placeholder="password">
      </div>
      <button class="btn-primary" id="btn-signup">登録する</button>
    </div>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- パスワードリセット画面 -->
<div id="reset-screen" style="display:none;min-height:100vh;display:none;align-items:center;justify-content:center;padding:1rem">
  <div class="auth-card">
    <div class="auth-logo">🏢 理事会タスク管理</div>
    <div class="auth-sub">新しいパスワードを設定してください</div>
    <div class="form-group" style="margin-top:1.5rem">
      <label class="form-label">新しいパスワード（6文字以上）</label>
      <input class="form-input" type="password" id="new-password" placeholder="新しいパスワード">
    </div>
    <div class="form-group">
      <label class="form-label">パスワード（確認）</label>
      <input class="form-input" type="password" id="new-password-confirm" placeholder="もう一度入力">
    </div>
    <button class="btn-primary" id="btn-update-password">パスワードを変更する</button>
    <div class="auth-msg" id="reset-msg"></div>
  </div>
</div>

<div id="main-app">
  <div class="topbar">
    <div class="topbar-title">🏢 理事会タスク管理</div>
    <div class="topbar-right">
      <span class="user-email" id="user-email"></span>
      <button class="btn-logout" id="btn-logout">ログアウト</button>
    </div>
  </div>
  <div class="content">
    <div class="stats" id="stats"></div>
    <div class="toolbar">
      <select id="filterAssignee"><option value="">全担当者</option></select>
      <select id="filterCat">
        <option value="">全カテゴリ</option>
        <option>設備</option><option>会計</option><option>総会</option>
        <option>清掃</option><option>防犯</option><option>消防</option><option>その他</option>
      </select>
      <input id="search" placeholder="タスクを検索...">
      <button class="btn-add" id="btn-add">＋ タスクを追加</button>
    </div>
    <div id="board-area"><div class="loading">読み込み中...</div></div>
  </div>
</div>

<!-- 詳細パネル -->
<div class="overlay" id="detail-overlay" style="display:none">
  <div class="modal" style="width:min(560px,92vw)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:8px;flex-wrap:wrap">
      <div class="modal-title" style="margin:0" id="detail-title"></div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <button class="btn-cancel" id="btn-detail-pdf">📄 PDF出力</button>
        <button class="btn-save" id="btn-detail-edit">編集</button>
        <button class="btn-cancel" id="btn-detail-close">✕</button>
      </div>
    </div>
    <div id="detail-content"></div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="overlay" id="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-title" id="modal-title">タスクを追加</div>
    <div class="form-group">
      <label class="form-label">タスク名 *</label>
      <input class="form-input" id="f-title" placeholder="例：エレベーター点検の手配">
    </div>
    <div class="form-group">
      <label class="form-label">詳細・メモ</label>
      <textarea class="form-textarea" id="f-desc" placeholder="備考や詳細を入力..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">担当者 *（複数選択可）</label>
      <div id="f-assignee-list" style="border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 12px;max-height:200px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:2px"></div>
    </div>
    <div class="modal-grid">
      <div class="form-group">
        <label class="form-label">カテゴリ</label>
        <select class="form-select" id="f-cat">
          <option>設備</option><option>会計</option><option>総会</option>
          <option>清掃</option><option>防犯</option><option>消防</option><option>その他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">ステータス</label>
        <select class="form-select" id="f-status">
          <option value="todo">未着手</option>
          <option value="doing">対応中</option>
          <option value="done">完了</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">期限</label>
      <input class="form-input" type="date" id="f-due">
    </div>
    <div class="form-group">
      <label class="form-label">進捗状況</label>
      <textarea class="form-textarea" id="f-progress-note" placeholder="現在の進捗や途中経過を記載..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">完了報告</label>
      <textarea class="form-textarea" id="f-completion-note" placeholder="完了した内容や結果を記載..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-delete" id="btn-delete" style="display:none">削除</button>
      <button class="btn-cancel" id="btn-cancel">キャンセル</button>
      <button class="btn-save" id="btn-save">保存</button>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
